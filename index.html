<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AS-565 PERF Calculator (Stable Display Toggle)</title>
    <style>
        /* 가민 CDU 스타일 다크 테마 */
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #050505; 
            color: #e0e0e0; 
            padding: 10px; 
            display: flex;
            justify-content: center;
            user-select: none; 
            touch-action: manipulation;
        }
        
        .cdu-container { 
            background-color: #121212; 
            border: 2px solid #333; 
            border-radius: 8px; 
            width: 100%;
            max-width: 600px; 
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1); 
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 650px;
        }

        .cdu-header { 
            background-color: #0a0a0a;
            color: #00ff66; 
            padding: 12px; 
            font-weight: bold; 
            text-align: center; 
            font-size: 1.2em;
            border-bottom: 2px solid #333;
            letter-spacing: 1px;
        }

        /* --- Main Page (테이블) 스타일 --- */
        table { border-collapse: collapse; width: 100%; table-layout: fixed; margin-bottom: 15px; }
        th, td { border: 1px solid #2a2a2a; padding: 12px 5px; text-align: center; font-size: 14px; }
        th { background-color: #1a1a1a; color: #00ff66; font-weight: normal; }
        .col-header { color: #00ff66; text-align: left; padding-left: 10px; font-size: 13px; }
        
        /* 터치 가능한 입력 박스 */
        .touch-box {
            display: inline-block;
            width: 80%; 
            padding: 8px; 
            background-color: #000; 
            color: #00ffff; 
            border: 1px solid #444; 
            border-radius: 4px; 
            text-align: center; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.8);
            transition: background-color 0.1s;
        }
        .touch-box:active { background-color: #0a2a2a; border-color: #00ffff; }
        .fuel-box { border-color: #ffcc00; } 
        
        .subtotal-val { color: #ffffff; }
        .total-row { background-color: #1a1a1a; font-weight: bold; font-size: 1.1em; border-top: 2px solid #444; }
        .weight-normal { color: #00ff66; }
        .weight-over { color: #ff3333; animation: blink 1s infinite; } 

        @keyframes blink { 50% { opacity: 0; } }

        /* 결과창 스타일 */
        .result-section { 
            padding: 15px; 
            border: 2px solid #333; 
            background-color: #0a0a0a; 
            border-radius: 5px;
            margin-top: auto;
        }
        
        .torque-container { display: flex; justify-content: space-around; gap: 10px; }
        .torque-box { 
            flex: 1; text-align: center; font-size: 22px; font-weight: bold; 
            padding: 15px 5px; border-radius: 5px; background-color: #111; border: 1px solid #00ffff; color: #ff00ff;
        }
        .torque-title { color: #ffffff; font-size: 14px; display: block; margin-bottom: 5px; }

        /* --- Input Page (Numpad) 스타일 --- */
        .input-title { color: #00ff66; font-size: 18px; margin-bottom: 20px; font-weight: bold; text-align: center; }
        
        .display-screen {
            width: 80%;
            height: 60px;
            background-color: #000;
            border: 2px solid #444;
            border-radius: 8px;
            color: #00ffff;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 30px;
            box-shadow: inset 0 0 10px rgba(0,255,255,0.1);
        }

        .numpad-grid {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .num-btn {
            width: 80px; height: 70px;
            background: linear-gradient(to bottom, #333, #111);
            border: 2px solid #444;
            border-radius: 8px;
            color: white; font-size: 24px; font-weight: bold; font-family: inherit;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }
        .num-btn:active { transform: translateY(4px); box-shadow: 0 0 2px rgba(0,0,0,0.5); background: #222; }
        .btn-clr { color: #ff9900; }
        
        .action-row { display: flex; gap: 20px; width: 80%; justify-content: center; }
        .action-btn {
            flex: 1; height: 60px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; font-family: inherit;
        }
        .btn-cancel { background-color: #444; color: white; border: 2px solid #666; }
        .btn-enter { background-color: #004422; color: #00ff66; border: 2px solid #00ff66; }
        .action-btn:active { filter: brightness(0.8); }

    </style>
</head>
<body>

<div class="cdu-container">
    <div class="cdu-header" id="app-header">PERF INIT / HOVER TQ (AS-565)</div>
    
    <div id="main-screen" style="display: flex; flex-direction: column; flex: 1; padding: 15px;">
        <table>
            <thead>
                <tr>
                    <th>ITEM</th>
                    <th>INPUT</th>
                    <th>KG</th>
                    <th>LBS</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="col-header">BEW</td>
                    <td><div class="touch-box" id="val-bew" onclick="openInput('bew')">2889.2</div></td>
                    <td class="subtotal-val" id="kg-bew">-</td>
                    <td class="subtotal-val" id="lbs-bew">-</td>
                </tr>
                <tr>
                    <td class="col-header">PILOT</td>
                    <td><div class="touch-box" id="val-pilot" onclick="openInput('pilot')">2</div></td>
                    <td class="subtotal-val" id="kg-pilot">-</td>
                    <td class="subtotal-val" id="lbs-pilot">-</td>
                </tr>
                <tr>
                    <td class="col-header">CREW/SENSOR</td>
                    <td><div class="touch-box" id="val-crew" onclick="openInput('crew')">1</div></td>
                    <td class="subtotal-val" id="kg-crew">-</td>
                    <td class="subtotal-val" id="lbs-crew">-</td>
                </tr>
                <tr>
                    <td class="col-header">RESCUE</td>
                    <td><div class="touch-box" id="val-rescu" onclick="openInput('rescu')">0</div></td>
                    <td class="subtotal-val" id="kg-rescu">-</td>
                    <td class="subtotal-val" id="lbs-rescu">-</td>
                </tr>
                <tr>
                    <td class="col-header" style="color:#ffcc00;">FUEL [LBS]</td>
                    <td><div class="touch-box fuel-box" id="val-fuel" onclick="openInput('fuel')">1500</div></td>
                    <td class="subtotal-val" id="kg-fuel">-</td>
                    <td class="subtotal-val" id="lbs-fuel" style="color:#00ffff;">-</td>
                </tr>
                <tr>
                    <td class="col-header">EXTRA EQ</td>
                    <td><div class="touch-box" id="val-etc" onclick="openInput('etc')">26</div></td>
                    <td class="subtotal-val" id="kg-etc">-</td>
                    <td class="subtotal-val" id="lbs-etc">-</td>
                </tr>
                <tr>
                    <td class="col-header" style="color:#ff00ff;">OAT(°C)</td>
                    <td><div class="touch-box" id="val-temp" style="border-color:#ff00ff;" onclick="openInput('temp')">15</div></td>
                    <td colspan="2" style="color:#888; font-size:11px;">BASE REF:<br><span style="color:#ccc;" id="base-tq">--%</span></td>
                </tr>
                <tr class="total-row">
                    <td colspan="2" style="text-align: right; padding-right: 10px; color: #00ff66;">GROSS (AGW):</td>
                    <td id="kg-total" class="weight-normal">-</td>
                    <td id="lbs-total" class="weight-normal">-</td>
                </tr>
            </tbody>
        </table>

        <div id="limit-msg" style="text-align: right; color: #888; font-size: 12px; margin-top: 5px; margin-bottom: 15px; font-weight:bold;">
            MAX LIMIT: 4300KG / 9800LBS
        </div>

        <div class="result-section">
            <div class="torque-container">
                <div class="torque-box">
                    <span class="torque-title">0KT IGE TQ</span>
                    <span id="out-ige">-- %</span>
                </div>
                <div class="torque-box">
                    <span class="torque-title">0KT OGE TQ</span>
                    <span id="out-oge">-- %</span>
                </div>
            </div>
        </div>
    </div>

    <div id="input-screen" style="display: none; flex-direction: column; flex: 1; padding: 15px; align-items: center; justify-content: center;">
        <div class="input-title" id="input-title">ENTER VALUE</div>
        
        <div class="display-screen" id="numpad-display"></div>

        <div class="numpad-grid">
            <button class="num-btn" onclick="pressKey('7')">7</button>
            <button class="num-btn" onclick="pressKey('8')">8</button>
            <button class="num-btn" onclick="pressKey('9')">9</button>
            
            <button class="num-btn" onclick="pressKey('4')">4</button>
            <button class="num-btn" onclick="pressKey('5')">5</button>
            <button class="num-btn" onclick="pressKey('6')">6</button>
            
            <button class="num-btn" onclick="pressKey('1')">1</button>
            <button class="num-btn" onclick="pressKey('2')">2</button>
            <button class="num-btn" onclick="pressKey('3')">3</button>
            
            <button class="num-btn btn-clr" onclick="pressBackspace()">CLR</button>
            <button class="num-btn" onclick="pressKey('0')">0</button>
            <button class="num-btn" onclick="pressKey('-')">-</button>
        </div>

        <div class="action-row">
            <button class="action-btn btn-cancel" onclick="closeInput()">CANCEL</button>
            <button class="action-btn btn-enter" onclick="confirmInput()">ENTER</button>
        </div>
    </div>

</div>

<script>
    // --- 상수 및 성능 데이터 ---
    const KG_TO_LBS = 2.20462262;
    const LIMIT_KG = 4300;
    const LIMIT_LBS = 9800;
    const temps = [-5, 10, 15, 20, 25, 30, 35];
    const perfDataTbl = [
        { w: 4300, tq: [89.5, 90.75, 92.0, 92.7, 93.4, 94.1, 94.8] },
        { w: 4200, tq: [86.5, 87.60, 88.7, 89.3, 89.9, 90.5, 91.1] },
        { w: 4100, tq: [83.5, 84.50, 85.5, 86.0, 86.5, 87.0, 87.5] },
        { w: 4000, tq: [80.5, 81.40, 82.3, 82.8, 83.3, 83.8, 84.3] }
    ];

    // --- 비행 데이터 저장소 ---
    let flightData = { bew: 2889.2, pilot: 2, crew: 1, rescu: 0, fuel: 1500, etc: 26, temp: 15 };

    // 키패드 입력 관련 변수
    let activeKey = '';
    let currentVal = '';
    let isTyping = false;

    const titleMap = {
        'bew': 'BASIC EMPTY WEIGHT (KG)', 'pilot': 'PILOT QTY', 'crew': 'CREW/SENSOR QTY',
        'rescu': 'RESCUE SWIMMER QTY', 'fuel': 'MISSION FUEL (LBS)', 'etc': 'EXTRA EQUIP (KG)', 'temp': 'OAT (TEMPERATURE °C)'
    };

    // --- 화면 전환 로직 (Toggle) ---
    function openInput(key) {
        activeKey = key;
        currentVal = flightData[key].toString();
        isTyping = false;
        
        document.getElementById('input-title').innerText = "ENTER " + titleMap[key];
        document.getElementById('app-header').innerText = "DATA ENTRY MODE";
        
        updateNumpadDisplay();

        // 메인 화면 숨기고 입력 화면 보이기
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('input-screen').style.display = 'flex';
    }

    function closeInput() {
        // 입력 화면 숨기고 메인 화면 보이기
        document.getElementById('input-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'flex';
        document.getElementById('app-header').innerText = "PERF INIT / HOVER TQ (AS-565)";
        
        updateMainScreen(); // 화면으로 돌아올 때 최신 데이터로 계산 업데이트
    }

    // --- 키패드 타이핑 로직 ---
    function pressKey(char) {
        if (!isTyping) { currentVal = char; isTyping = true; } 
        else {
            if (char === '.' && currentVal.includes('.')) return;
            if (char === '-' && currentVal.length > 0) return;
            if (currentVal.length < 8) currentVal += char;
        }
        updateNumpadDisplay();
    }

    function pressBackspace() {
        if (!isTyping) isTyping = true;
        currentVal = currentVal.slice(0, -1);
        updateNumpadDisplay();
    }

    function updateNumpadDisplay() {
        document.getElementById('numpad-display').innerText = currentVal + (isTyping ? '▮' : '');
    }

    function confirmInput() {
        if (currentVal !== "" && currentVal !== "-") {
            flightData[activeKey] = parseFloat(currentVal);
        }
        closeInput();
    }

    // --- 핵심 계산 및 메인 화면 업데이트 ---
    function calculateBaseTorque(weight, temp) {
        let row = perfDataTbl.reduce((prev, curr) => Math.abs(curr.w - weight) < Math.abs(prev.w - weight) ? curr : prev);
        let resultTq = 0;
        if (temp <= temps[0]) resultTq = row.tq[0];
        else if (temp >= temps[temps.length-1]) resultTq = row.tq[temps.length-1];
        else {
            for (let i = 0; i < temps.length - 1; i++) {
                if (temp >= temps[i] && temp <= temps[i+1]) {
                    const q1 = row.tq[i], q2 = row.tq[i+1];
                    const t1 = temps[i], t2 = temps[i+1];
                    resultTq = q1 + (q2 - q1) * (temp - t1) / (t2 - t1); break;
                }
            }
        }
        return resultTq;
    }

    function updateMainScreen() {
        // 1. 값 읽기 및 계산
        const kg_bew = parseFloat(flightData.bew) || 0;
        const kg_pilot = (parseFloat(flightData.pilot) || 0) * 80;
        const kg_crew = (parseFloat(flightData.crew) || 0) * 80;
        const kg_rescu = (parseFloat(flightData.rescu) || 0) * 90;
        const lbs_fuel = parseFloat(flightData.fuel) || 0;
        const kg_fuel = lbs_fuel / KG_TO_LBS;
        const kg_etc = parseFloat(flightData.etc) || 0;

        const total_kg = kg_bew + kg_pilot + kg_crew + kg_rescu + kg_fuel + kg_etc;
        const total_lbs = total_kg * KG_TO_LBS;
        
        // 2. 화면 숫자(입력 박스) 업데이트
        document.getElementById('val-bew').innerText = flightData.bew;
        document.getElementById('val-pilot').innerText = flightData.pilot;
        document.getElementById('val-crew').innerText = flightData.crew;
        document.getElementById('val-rescu').innerText = flightData.rescu;
        document.getElementById('val-fuel').innerText = flightData.fuel;
        document.getElementById('val-etc').innerText = flightData.etc;
        document.getElementById('val-temp').innerText = flightData.temp;

        // 3. 소계 업데이트
        document.getElementById('kg-bew').innerText = kg_bew.toFixed(1);
        document.getElementById('kg-pilot').innerText = kg_pilot.toFixed(1);
        document.getElementById('kg-crew').innerText = kg_crew.toFixed(1);
        document.getElementById('kg-rescu').innerText = kg_rescu.toFixed(1);
        document.getElementById('kg-fuel').innerText = kg_fuel.toFixed(1);
        document.getElementById('kg-etc').innerText = kg_etc.toFixed(1);

        document.getElementById('lbs-bew').innerText = (kg_bew * KG_TO_LBS).toFixed(1);
        document.getElementById('lbs-pilot').innerText = (kg_pilot * KG_TO_LBS).toFixed(1);
        document.getElementById('lbs-crew').innerText = (kg_crew * KG_TO_LBS).toFixed(1);
        document.getElementById('lbs-rescu').innerText = (kg_rescu * KG_TO_LBS).toFixed(1);
        document.getElementById('lbs-fuel').innerText = lbs_fuel.toFixed(0);
        document.getElementById('lbs-etc').innerText = (kg_etc * KG_TO_LBS).toFixed(1);

        // 4. 총중량 및 경고 업데이트
        const elKg = document.getElementById('kg-total');
        const elLbs = document.getElementById('lbs-total');
        const elMsg = document.getElementById('limit-msg');
        
        elKg.innerText = total_kg.toFixed(1) + " KG";
        elLbs.innerText = total_lbs.toFixed(1) + " LBS";

        if (total_kg >= LIMIT_KG || total_lbs >= LIMIT_LBS) {
            elKg.className = 'weight-over'; elLbs.className = 'weight-over';
            elMsg.innerHTML = "<span style='color:#ff3333;'>⚠ MTOW EXCEEDED!</span>";
        } else {
            elKg.className = 'weight-normal'; elLbs.className = 'weight-normal';
            elMsg.innerText = "MAX LIMIT: 4300KG / 9800LBS";
        }

        // 5. 토큐 산출 업데이트
        const temp = parseFloat(flightData.temp) || 15;
        const baseTq = calculateBaseTorque(total_kg, temp);
        
        document.getElementById('base-tq').innerText = baseTq.toFixed(2) + "%";
        document.getElementById('out-ige').innerText = (baseTq - 3).toFixed(2) + " %";
        document.getElementById('out-oge').innerText = (baseTq + 3).toFixed(2) + " %";
    }

    // 앱 켜질 때 최초 1회 업데이트
    window.onload = updateMainScreen;

</script>

</body>
</html>
