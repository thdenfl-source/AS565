<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AS-565 PERF Calculator (Updated)</title>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #050505; 
            color: #e0e0e0; 
            display: flex;
            justify-content: center;
            align-items: flex-start;
            user-select: none; 
            touch-action: manipulation;
            margin: 0;
            padding: 5px;
            height: 100vh;
            overflow: hidden;
        }
        
        .cdu-container { 
            background-color: #121212; 
            border: 2px solid #333; 
            border-radius: 10px; 
            width: 100%;
            max-width: 420px; 
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5); 
            display: flex;
            flex-direction: column;
            max-height: 98vh;
        }

        .cdu-header { 
            background-color: #0a0a0a;
            color: #00ff66; 
            padding: 6px; 
            font-weight: bold; 
            text-align: center; 
            font-size: 0.95em;
            border-bottom: 1px solid #444;
        }

        #main-screen {
            display: flex;
            flex-direction: column;
            padding: 6px;
        }

        table { border-collapse: collapse; width: 100%; table-layout: fixed; margin-bottom: 4px; }
        th, td { border: 1px solid #2a2a2a; padding: 4px 2px; text-align: center; font-size: 12px; }
        th { background-color: #1a1a1a; color: #00ff66; font-weight: normal; }
        .col-header { color: #00ff66; text-align: left; padding-left: 6px; font-size: 11px; }
        
        .touch-box {
            display: inline-block;
            width: 90%; 
            padding: 3px 0; 
            background-color: #000; 
            color: #00ffff; 
            border: 1px solid #444; 
            border-radius: 3px; 
            font-size: 14px; 
            font-weight: bold;
        }
        .fuel-box { border-color: #ffcc00; } 
        
        .subtotal-val { color: #ffffff; font-size: 11px; }
        .total-row { background-color: #1a1a1a; font-weight: bold; }
        .weight-normal { color: #00ff66; }
        .weight-over { color: #ff3333; animation: blink 1s infinite; } 

        @keyframes blink { 50% { opacity: 0; } }

        .result-section { 
            padding: 6px; 
            border: 1px solid #333; 
            background-color: #0a0a0a; 
            border-radius: 6px;
        }
        
        .torque-container { display: flex; justify-content: space-around; gap: 5px; margin-bottom: 6px; }
        .torque-box { 
            flex: 1; text-align: center; font-size: 16px; font-weight: bold; 
            padding: 6px 2px; border-radius: 4px; background-color: #111; border: 1px solid #444; color: #ff00ff;
        }
        .torque-title { color: #ffffff; font-size: 10px; display: block; margin-bottom: 2px; }

        .cdu-menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
        }

        .cdu-menu-btn {
            background: linear-gradient(180deg, #444 0%, #222 50%, #111 100%);
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 8px 0;
            text-align: center;
            font-size: 10px;
            font-weight: bold;
            box-shadow: 0 2px 0 #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cdu-menu-btn:active {
            transform: translateY(1px);
            box-shadow: 0 1px 0 #000;
            border-color: #00ffff;
        }

        .kuh-btn {
            grid-column: span 2;
            color: #ffcc00;
            border-color: #ffcc00;
            padding: 10px 0;
        }

        .input-title { color: #00ff66; font-size: 14px; margin-bottom: 8px; text-align: center; }
        .display-screen {
            width: 80%; height: 40px; background-color: #000; border: 2px solid #444; border-radius: 6px;
            color: #00ffff; font-size: 24px; display: flex; align-items: center; justify-content: center;
            margin-bottom: 10px;
        }
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 65px); gap: 8px; margin-bottom: 10px; }
        .num-btn {
            width: 65px; height: 50px; background: linear-gradient(to bottom, #333, #111);
            border: 1px solid #555; border-radius: 6px; color: white; font-size: 18px; font-weight: bold;
        }
        .action-row { display: flex; gap: 10px; width: 85%; }
        .action-btn { flex: 1; height: 40px; border-radius: 6px; font-weight: bold; border: none; }
        .btn-cancel { background-color: #444; color: white; }
        .btn-enter { background-color: #004422; color: #00ff66; border: 1px solid #00ff66; }

    </style>
</head>
<body>

<div class="cdu-container">
    <div class="cdu-header" id="app-header">PERF INIT / HOVER TQ (AS-565)</div>
    
    <div id="main-screen">
        <table>
            <thead>
                <tr>
                    <th style="width:35%">ITEM</th>
                    <th style="width:25%">INPUT</th>
                    <th style="width:20%">KG</th>
                    <th style="width:20%">LB</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="col-header">BEW</td>
                    <td><div class="touch-box" onclick="openInput('bew')"><span id="val-bew">2889.2</span></div></td>
                    <td class="subtotal-val" id="kg-bew">-</td>
                    <td class="subtotal-val" id="lbs-bew">-</td>
                </tr>
                <tr>
                    <td class="col-header">PILOT</td>
                    <td><div class="touch-box" onclick="openInput('pilot')"><span id="val-pilot">2</span></div></td>
                    <td class="subtotal-val" id="kg-pilot">-</td>
                    <td class="subtotal-val" id="lbs-pilot">-</td>
                </tr>
                <tr>
                    <td class="col-header">CREW/SNR</td>
                    <td><div class="touch-box" onclick="openInput('crew')"><span id="val-crew">1</span></div></td>
                    <td class="subtotal-val" id="kg-crew">-</td>
                    <td class="subtotal-val" id="lbs-crew">-</td>
                </tr>
                <tr>
                    <td class="col-header">RESCUE</td>
                    <td><div class="touch-box" onclick="openInput('rescu')"><span id="val-rescu">0</span></div></td>
                    <td class="subtotal-val" id="kg-rescu">-</td>
                    <td class="subtotal-val" id="lbs-rescu">-</td>
                </tr>
                <tr>
                    <td class="col-header" style="color:#ffcc00;">FUEL(LB)</td>
                    <td><div class="touch-box fuel-box" onclick="openInput('fuel')"><span id="val-fuel">1500</span></div></td>
                    <td class="subtotal-val" id="kg-fuel">-</td>
                    <td class="subtotal-val" id="lbs-fuel" style="color:#00ffff;">-</td>
                </tr>
                <tr>
                    <td class="col-header">EXTRA EQ</td>
                    <td><div class="touch-box" onclick="openInput('etc')"><span id="val-etc">26</span></div></td>
                    <td class="subtotal-val" id="kg-etc">-</td>
                    <td class="subtotal-val" id="lbs-etc">-</td>
                </tr>
                <tr>
                    <td class="col-header" style="color:#ff00ff;">OAT(°C)</td>
                    <td><div class="touch-box" style="border-color:#ff00ff;" onclick="openInput('temp')"><span id="val-temp">15</span></div></td>
                    <td colspan="2" style="color:#888; font-size:10px;">BASE TQ: <span style="color:#ccc;" id="base-tq">--%</span></td>
                </tr>
                <tr class="total-row">
                    <td colspan="2" style="text-align: right; padding-right: 8px; color: #00ff66; font-size: 11px;">AGW:</td>
                    <td id="kg-total" class="weight-normal" style="font-size:11px;">-</td>
                    <td id="lbs-total" class="weight-normal" style="font-size:11px;">-</td>
                </tr>
            </tbody>
        </table>

        <div id="limit-msg" style="text-align: right; color: #666; font-size: 10px; margin-bottom: 4px; font-weight:bold;">
            MAX: 4300KG / 9800LB
        </div>

        <div class="result-section">
            <div class="torque-container">
                <div class="torque-box">
                    <span class="torque-title">0KT IGE TQ</span>
                    <span id="out-ige">-- %</span>
                </div>
                <div class="torque-box">
                    <span class="torque-title">0KT OGE TQ</span>
                    <span id="out-oge">-- %</span>
                </div>
            </div>
            
            <div class="cdu-menu-grid">
                <a href="https://customwidgethosting.web.app/embed.html?ffCompiledSrc=https%3A%2F%2Fstorage.googleapis.com%2Fflutterflow-io-6f20.appspot.com%2Fbuild_outputs%2Fintegrated-flight-preparation-assistant-mlvjyo%2Fweb%2FQMZqWepPgY9jqDmcO2Uu%2Fmain.dart.js" target="_blank" class="cdu-menu-btn">CONNEXT WX</a>
                <a href="https://aim.koca.go.kr/eaipPub/Package/history-en-GB.html?language=ko_KR" target="_blank" class="cdu-menu-btn">CHARTS</a>
                <a href="https://thdenfl.tistory.com" target="_blank" class="cdu-menu-btn">SERVICES</a>
                <a href="https://thdenfl-source.github.io/Locus/" target="_blank" class="cdu-menu-btn">FLIGHT PLAN</a>
                <a href="https://thdenfl-source.github.io/GarminCDU/" target="_blank" class="cdu-menu-btn kuh-btn">KUH-1CG Performance</a>
            </div>
        </div>
    </div>

    <div id="input-screen" style="display: none; flex-direction: column; flex: 1; padding: 10px; align-items: center; justify-content: center;">
        <div class="input-title" id="input-title">ENTER VALUE</div>
        <div class="display-screen" id="numpad-display"></div>
        <div class="numpad-grid">
            <button class="num-btn" onclick="pressKey('7')">7</button>
            <button class="num-btn" onclick="pressKey('8')">8</button>
            <button class="num-btn" onclick="pressKey('9')">9</button>
            <button class="num-btn" onclick="pressKey('4')">4</button>
            <button class="num-btn" onclick="pressKey('5')">5</button>
            <button class="num-btn" onclick="pressKey('6')">6</button>
            <button class="num-btn" onclick="pressKey('1')">1</button>
            <button class="num-btn" onclick="pressKey('2')">2</button>
            <button class="num-btn" onclick="pressKey('3')">3</button>
            <button class="num-btn" style="color:#ff9900" onclick="pressBackspace()">CLR</button>
            <button class="num-btn" onclick="pressKey('0')">0</button>
            <button class="num-btn" onclick="pressKey('.')">.</button>
        </div>
        <div class="action-row">
            <button class="action-btn btn-cancel" onclick="closeInput()">CANCEL</button>
            <button class="action-btn btn-enter" onclick="confirmInput()">ENTER</button>
        </div>
    </div>
</div>

<script>
    const KG_TO_LBS = 2.20462262;
    const LIMIT_KG = 4300;
    const temps = [-5, 10, 15, 20, 25, 30, 35];
    const perfDataTbl = [
        { w: 4300, tq: [89.5, 90.75, 92.0, 92.7, 93.4, 94.1, 94.8] },
        { w: 4200, tq: [86.5, 87.60, 88.7, 89.3, 89.9, 90.5, 91.1] },
        { w: 4100, tq: [83.5, 84.50, 85.5, 86.0, 86.5, 87.0, 87.5] },
        { w: 4000, tq: [80.5, 81.40, 82.3, 82.8, 83.3, 83.8, 84.3] }
    ];

    let flightData = { bew: 2889.2, pilot: 2, crew: 1, rescu: 0, fuel: 1500, etc: 26, temp: 15 };
    let activeKey = '';
    let currentVal = '';
    let isTyping = false;

    function openInput(key) {
        activeKey = key;
        currentVal = flightData[key].toString();
        isTyping = false;
        document.getElementById('input-title').innerText = "ENTER VALUE";
        updateNumpadDisplay();
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('input-screen').style.display = 'flex';
    }

    function closeInput() {
        document.getElementById('input-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'flex';
        updateMainScreen();
    }

    function pressKey(char) {
        if (!isTyping) { currentVal = char; isTyping = true; } 
        else {
            if (char === '.' && currentVal.includes('.')) return;
            if (currentVal.length < 8) currentVal += char;
        }
        updateNumpadDisplay();
    }

    function pressBackspace() {
        currentVal = currentVal.slice(0, -1);
        updateNumpadDisplay();
    }

    function updateNumpadDisplay() {
        document.getElementById('numpad-display').innerText = currentVal + (isTyping ? '▮' : '');
    }

    function confirmInput() {
        if (currentVal !== "") flightData[activeKey] = parseFloat(currentVal);
        closeInput();
    }

    function calculateBaseTorque(weight, temp) {
        let row = perfDataTbl.reduce((prev, curr) => Math.abs(curr.w - weight) < Math.abs(prev.w - weight) ? curr : prev);
        let resultTq = 0;
        if (temp <= temps[0]) resultTq = row.tq[0];
        else if (temp >= temps[temps.length-1]) resultTq = row.tq[temps.length-1];
        else {
            for (let i = 0; i < temps.length - 1; i++) {
                if (temp >= temps[i] && temp <= temps[i+1]) {
                    const q1 = row.tq[i], q2 = row.tq[i+1];
                    const t1 = temps[i], t2 = temps[i+1];
                    resultTq = q1 + (q2 - q1) * (temp - t1) / (t2 - t1); break;
                }
            }
        }
        return resultTq;
    }

    function updateMainScreen() {
        const kg_bew = parseFloat(flightData.bew) || 0;
        const kg_pilot = (parseFloat(flightData.pilot) || 0) * 80;
        const kg_crew = (parseFloat(flightData.crew) || 0) * 80;
        const kg_rescu = (parseFloat(flightData.rescu) || 0) * 90;
        const lbs_fuel = parseFloat(flightData.fuel) || 0;
        const kg_fuel = lbs_fuel / KG_TO_LBS;
        const kg_etc = parseFloat(flightData.etc) || 0;

        const total_kg = kg_bew + kg_pilot + kg_crew + kg_rescu + kg_fuel + kg_etc;
        const total_lbs = total_kg * KG_TO_LBS;
        
        document.getElementById('val-bew').innerText = flightData.bew;
        document.getElementById('val-pilot').innerText = flightData.pilot;
        document.getElementById('val-crew').innerText = flightData.crew;
        document.getElementById('val-rescu').innerText = flightData.rescu;
        document.getElementById('val-fuel').innerText = flightData.fuel;
        document.getElementById('val-etc').innerText = flightData.etc;
        document.getElementById('val-temp').innerText = flightData.temp;

        document.getElementById('kg-bew').innerText = kg_bew.toFixed(1);
        document.getElementById('kg-pilot').innerText = kg_pilot.toFixed(0);
        document.getElementById('kg-crew').innerText = kg_crew.toFixed(0);
        document.getElementById('kg-rescu').innerText = kg_rescu.toFixed(0);
        document.getElementById('kg-fuel').innerText = kg_fuel.toFixed(1);
        document.getElementById('kg-etc').innerText = kg_etc.toFixed(1);

        document.getElementById('lbs-bew').innerText = (kg_bew * KG_TO_LBS).toFixed(0);
        document.getElementById('lbs-pilot').innerText = (kg_pilot * KG_TO_LBS).toFixed(0);
        document.getElementById('lbs-crew').innerText = (kg_crew * KG_TO_LBS).toFixed(0);
        document.getElementById('lbs-rescu').innerText = (kg_rescu * KG_TO_LBS).toFixed(0);
        document.getElementById('lbs-fuel').innerText = lbs_fuel.toFixed(0);
        document.getElementById('lbs-etc').innerText = (kg_etc * KG_TO_LBS).toFixed(0);

        const elKg = document.getElementById('kg-total');
        const elLbs = document.getElementById('lbs-total');
        const elMsg = document.getElementById('limit-msg');
        
        elKg.innerText = total_kg.toFixed(1) + " KG";
        elLbs.innerText = total_lbs.toFixed(0) + " LB";

        if (total_kg >= LIMIT_KG) {
            elKg.className = 'weight-over'; elLbs.className = 'weight-over';
            elMsg.innerHTML = "<span style='color:#ff3333;'>⚠ EXCEED MTOW</span>";
        } else {
            elKg.className = 'weight-normal'; elLbs.className = 'weight-normal';
            elMsg.innerText = "MAX: 4300KG / 9800LB";
        }

        const temp = parseFloat(flightData.temp) || 15;
        const baseTq = calculateBaseTorque(total_kg, temp);
        
        document.getElementById('base-tq').innerText = baseTq.toFixed(1) + "%";
        document.getElementById('out-ige').innerText = (baseTq - 3).toFixed(1) + "%";
        document.getElementById('out-oge').innerText = (baseTq + 3).toFixed(1) + "%";
    }

    window.onload = updateMainScreen;
</script>

</body>
</html>
